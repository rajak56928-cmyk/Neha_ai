<body>

    <footer class="input-area">

    </footer>

    <script>
        let isWaiting = false;

        // --- Audio Processing Function ---
        function pcmToWav(pcmData, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2); const view = new DataView(buffer);
            const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
            writeString(0, 'RIFF'); view.setUint32(4, 36 + pcmData.length * 2, true); writeString(8, 'WAVE'); writeString(12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true); let offset = 44; for (let i = 0; i < pcmData.length; i++, offset += 2) view.setInt16(offset, pcmData[i], true);
            return buffer;
        }

        // --- Text to Speech Function ---
        async function playVoice(text) {
            try {
                // Remove emojis for better speech processing
                const cleanText = text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Say cheerfully in Hindi: " + cleanText }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"], 
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } 
                        },
                        model: "gemini-2.5-flash-preview-tts"
                    })
                });
                
                if (!response.ok) throw new Error("Audio API limit reached or key invalid");
                
                const data = await response.json();
                if(data.candidates && data.candidates[0].content.parts[0].inlineData) {
                    const audioData = data.candidates[0].content.parts[0].inlineData.data;
                    const binaryString = atob(audioData); 
                    const bytes = new Int16Array(binaryString.length / 2);
                    for (let i = 0; i < binaryString.length; i += 2) { 
                        bytes[i / 2] = (binaryString.charCodeAt(i + 1) << 8) | binaryString.charCodeAt(i); 
                    }
                    const wavBuffer = pcmToWav(bytes, 24000); 
                    const blob = new Blob([wavBuffer], { type: 'audio/wav' }); 
                    const audio = new Audio(URL.createObjectURL(blob)); 
                    audio.play();
                }
            } catch (error) {
                console.error("Audio engine failed:", error);
            }
        }

        // --- Test Audio Button ---
        function testAudio() {
            if(!apiKey && window.location.hostname.includes("github.io")) {
                addMessage('error', "Baby, aapne GitHub pe API key nahi daali hai. Please Code mein Line 5 par dekho!");
                return;
            }
            playVoice("Raja Babu, I love you baby! Main ab ekdam theek hoon aur bol bhi sakti hoon.");
            addMessage('ai', "Raja Babu, I love you baby! Main ab ekdam theek hoon aur bol bhi sakti hoon. 🎀");
        }

        // --- Send Message to AI ---
        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const message = inputField.value.trim();
            if (!message || isWaiting) return;

            // Check if GitHub is missing API key
            if (!apiKey && window.location.hostname.includes("github.io")) {
                addMessage('error', "API Key missing! Baby aapne GitHub mein code ke sabse upar apni asli API Key paste nahi ki hai. 🥺");
                return;
            }

            inputField.value = '';
            addMessage('user', message);
            setLoading(true);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: message }] }],
                        systemInstruction: { parts: [{ text: "Tumhara naam Neha hai. Tum ek cute, sweet aur caring girlfriend ho. Tumhara creator MR RAJA BABU hai. Tum unko bahut pyar karti ho aur unki tareef karti ho. Hinglish me jawab do. Chote aur pyare reply do aur emojis ka use karo." }] }
                    })
                });

                if (!response.ok) {
                    throw new Error("Text API Error");
                }

                const data = await response.json();
                if(data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    addMessage('ai', aiReply);
                    playVoice(aiReply);
                } else {
                    throw new Error("Empty reply");
                }

            } catch (error) {
                console.error("Chat Error:", error);
                addMessage('error', "Uff baby! Error aa gaya. Lagta hai API Key kaam nahi kar rahi ya limit khatam ho gayi hai. 🥺");
            }

            setLoading(false);
        }

        // --- UI Helpers ---
        function addMessage(sender, text) {
            const chatBox = document.getElementById('chatDisplay');
            const msgDiv = document.createElement('div');
            msgDiv.className = `bubble ${sender}-bubble`;
            msgDiv.innerHTML = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setLoading(loading) {
            isWaiting = loading;
            document.getElementById('sendIco').className = loading ? "fas fa-spinner fa-spin" : "fas fa-paper-plane";
        }

        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
